name: TestNG CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: List files for debugging
        run: find . -maxdepth 4 -not -path '*/.*'

      - name: Run TestNG Suite
        # Using a more flexible property for the suite file path
        run: mvn -B test -DsuiteXmlFile=src/test/resources/testng.xml

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testng-reports
          path: target/surefire-reports/